
services:
  # Laravel Backend (PHP-FPM)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  # Nginx Web Server for Laravel
  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # React Frontend (Vite)
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"  
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # Redis for Caching
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"